# =============================================================================
# config.yaml — Configuración central del sistema value investing TFG
# =============================================================================
# Todos los umbrales y supuestos están aquí. Nada está hardcodeado en el código.
# Modifica este fichero para recalibrar el sistema o hacer análisis de sensibilidad.
# =============================================================================

# -----------------------------------------------------------------------------
# SEC EDGAR — fuente de datos fundamentales
# -----------------------------------------------------------------------------
sec:
  contact_email: "jianwu.hu.04@gmail.com"   # EDITA ESTO: identificador requerido por la SEC
  base_url: "https://data.sec.gov"
  submissions_url: "https://data.sec.gov/submissions"
  facts_url: "https://data.sec.gov/api/xbrl/companyfacts"
  # La SEC no identifica las empresas por su ticker (AAPL) sino por un número CIK (320193), que es el que hay que usar para descargar los datos.
  # Mapa oficial para pasar identificar el ticker a través del CIK (lo publica la SEC, no es una API con clave)
  tickers_url: "https://www.sec.gov/files/company_tickers.json"
  # Pausa entre peticiones para respetar el rate limit de la SEC (10 req/s)
  request_delay_seconds: 0.15
  # Número máximo de reintentos ante errores 429/503
  max_retries: 3
  # Conceptos XBRL que se extraen de companyfacts (lista curada; se ignora el resto).
  # Cada entrada: tag (etiqueta XBRL), unit (unidad a leer) y taxonomy (us-gaap por defecto, dei para algunos).
  # Solo se extraen los conceptos necesarios.
  concepts:
    # --- Cuenta de resultados ---
    # Ingresos: distintas etiquetas según empresa/año (las clásicas Sales* anteriores
    # a 2018 conviven con Revenues y la nueva RevenueFromContract...).
    - {tag: "Revenues", unit: "USD"}
    - {tag: "RevenueFromContractWithCustomerExcludingAssessedTax", unit: "USD"}
    - {tag: "SalesRevenueNet", unit: "USD"}
    - {tag: "SalesRevenueGoodsNet", unit: "USD"}
    - {tag: "CostOfRevenue", unit: "USD"}
    - {tag: "CostOfGoodsAndServicesSold", unit: "USD"}
    - {tag: "GrossProfit", unit: "USD"}
    - {tag: "OperatingIncomeLoss", unit: "USD"}
    - {tag: "NetIncomeLoss", unit: "USD"}
    - {tag: "InterestExpense", unit: "USD"}
    - {tag: "IncomeTaxExpenseBenefit", unit: "USD"}
    # --- Flujos de caja ---
    # capex y D&A: variantes según sector (industriales/aerolíneas usan tags propios).
    - {tag: "NetCashProvidedByUsedInOperatingActivities", unit: "USD"}
    - {tag: "PaymentsToAcquirePropertyPlantAndEquipment", unit: "USD"}
    - {tag: "PaymentsToAcquireProductiveAssets", unit: "USD"}
    - {tag: "DepreciationDepletionAndAmortization", unit: "USD"}
    - {tag: "DepreciationAndAmortization", unit: "USD"}
    - {tag: "DepreciationAmortizationAndAccretionNet", unit: "USD"}
    # --- Balance ---
    - {tag: "Assets", unit: "USD"}
    - {tag: "AssetsCurrent", unit: "USD"}
    - {tag: "Liabilities", unit: "USD"}
    - {tag: "LiabilitiesCurrent", unit: "USD"}
    - {tag: "CashAndCashEquivalentsAtCarryingValue", unit: "USD"}
    - {tag: "ShortTermInvestments", unit: "USD"}
    # Deuda: tramos y totales, incluyendo variantes con obligaciones de leasing
    - {tag: "LongTermDebtNoncurrent", unit: "USD"}
    - {tag: "LongTermDebtAndCapitalLeaseObligations", unit: "USD"}
    - {tag: "LongTermDebtCurrent", unit: "USD"}
    - {tag: "LongTermDebtAndCapitalLeaseObligationsCurrent", unit: "USD"}
    - {tag: "DebtCurrent", unit: "USD"}
    - {tag: "LongTermDebt", unit: "USD"}
    - {tag: "DebtLongtermAndShorttermCombinedAmount", unit: "USD"}
    - {tag: "DebtAndCapitalLeaseObligations", unit: "USD"}
    - {tag: "StockholdersEquity", unit: "USD"}
    # --- Acciones en circulación ---
    - {tag: "CommonStockSharesOutstanding", unit: "shares"}
    - {tag: "WeightedAverageNumberOfSharesOutstandingBasic", unit: "shares"}
    - {tag: "WeightedAverageNumberOfDilutedSharesOutstanding", unit: "shares"}
    - {tag: "EntityCommonStockSharesOutstanding", unit: "shares", taxonomy: "dei"}

# -----------------------------------------------------------------------------
# Universo de empresas
# -----------------------------------------------------------------------------
universe:
  index: "SP500"
  # Número mínimo de años de histórico de fundamentales requeridos
  min_history_years: 4
  # Fecha de inicio del backtest (se necesitan datos desde antes para el lookback)
  backtest_start: "2013-01-01"
  backtest_end: "2025-12-31"

# -----------------------------------------------------------------------------
# Descarga de precios (yfinance)
# -----------------------------------------------------------------------------
prices:
  index_ticker: "^SP500TR"            # S&P 500 Total Return (con dividendos)
  # Ticker de la letra del Tesoro a 13 semanas (tipo libre de riesgo)
  risk_free_ticker: "^IRX"
  # Frecuencia de precios para el backtest
  price_frequency: "1d"          # precios diarios

# -----------------------------------------------------------------------------
# Constituyentes históricos del índice (universo point-in-time)
# -----------------------------------------------------------------------------
# CSV público con la composición histórica del S&P 500 (mitiga el sesgo de
# supervivencia). Cada fila es una fecha con la lista de tickers vigentes ese día.
constituents:
  # El fichero histórico del repo fja05680/sp500 lleva la fecha de actualización en
  # el nombre y se renueva periódicamente (una URL fija acaba dando 404). Para que el
  # proyecto siga siendo reproducible, se localiza dinámicamente el CSV más reciente
  # que cumpla el patrón, vía la API de contenidos de GitHub.
  repo_contents_url: "https://api.github.com/repos/fja05680/sp500/contents"
  file_pattern: "S&P 500 Historical Components & Changes\\((\\d{2}-\\d{2}-\\d{4})\\)\\.csv"
  # Override opcional: si se indica una URL directa, se usa esa y se omite la búsqueda del más reciente.
  url: ""
  # Nombre del fichero crudo cacheado bajo data/raw/constituents/
  raw_file: "sp500_historical.csv"
  # Nombre de la columna de fecha y de la de tickers en el CSV de origen
  date_column: "date"
  tickers_column: "tickers"
  # Separador de los tickers dentro de la celda
  tickers_separator: ","

# -----------------------------------------------------------------------------
# Sector a partir del código SIC de la SEC
# -----------------------------------------------------------------------------
# Se agrupan los códigos SIC en sectores. Las etiquetas Banking / Insurance /
# Utilities deben coincidir con filters.excluded_sectors. Cada grupo define rangos
# [desde, hasta] de SIC (ambos inclusive). Lo que no caiga en ningún rango -> default.
sectors:
  default: "Other"
  sic_groups:
    Agriculture:    [[100, 999]]
    Mining:         [[1000, 1499]]
    Construction:   [[1500, 1799]]
    Manufacturing:  [[2000, 3999]]
    Transportation: [[4000, 4899]]
    Utilities:      [[4900, 4999]]
    Trade:          [[5000, 5999]]
    Banking:        [[6000, 6199]]
    Finance:        [[6200, 6299], [6500, 6799]]
    Insurance:      [[6300, 6499]]
    Services:       [[7000, 8999]]

# -----------------------------------------------------------------------------
# Caché y persistencia
# -----------------------------------------------------------------------------
cache:
  raw_dir: "data/raw"
  cache_dir: "data/cache"
  # Formato de serialización para DataFrames
  format: "parquet"
  # Días antes de considerar que un fichero de caché está obsoleto
  max_age_days: 7

# -----------------------------------------------------------------------------
# Métricas derivadas (paso 1.2) — capa point-in-time
# -----------------------------------------------------------------------------
# Las cuentas se construyen sobre un panel ANUAL (formularios 10-K). Como una misma
# magnitud puede reportarse con distintas etiquetas XBRL según la empresa/año, aquí
# se declara, por cada magnitud canónica, la lista de tags por orden de preferencia:
# se usa el primero que tenga datos. Las fórmulas (EBITDA, deuda neta, FCF...) viven
# en el código; los umbrales siguen en `filters`/`valuation`.
fundamentals:
  # Prefijo de los formularios considerados anuales (incluye 10-K y 10-K/A)
  annual_form_prefix: "10-K"
  # Un 10-K puede incluir datos trimestrales y de portada. Para quedarnos solo con las
  # cifras anuales: las duraciones (cuenta de resultados, flujos) deben cubrir ~1 año
  # (rango en días; cubre el año fiscal de 52/53 semanas de muchas empresas), y los
  # instantes de balance solo se conservan si caen en un cierre de año fiscal.
  annual_period_days_min: 300
  annual_period_days_max: 400
  concept_map:
    # --- Cuenta de resultados ---
    revenue:
      - "Revenues"
      - "RevenueFromContractWithCustomerExcludingAssessedTax"
      - "SalesRevenueNet"
      - "SalesRevenueGoodsNet"
    cost_of_revenue: ["CostOfRevenue", "CostOfGoodsAndServicesSold"]
    gross_profit: ["GrossProfit"]
    operating_income: ["OperatingIncomeLoss"]
    net_income: ["NetIncomeLoss"]
    interest_expense: ["InterestExpense"]
    income_tax: ["IncomeTaxExpenseBenefit"]
    # --- Flujos de caja ---
    cfo: ["NetCashProvidedByUsedInOperatingActivities"]
    capex: ["PaymentsToAcquirePropertyPlantAndEquipment", "PaymentsToAcquireProductiveAssets"]
    dep_amort:
      - "DepreciationDepletionAndAmortization"
      - "DepreciationAndAmortization"
      - "DepreciationAmortizationAndAccretionNet"
    # --- Balance ---
    total_assets: ["Assets"]
    current_assets: ["AssetsCurrent"]
    total_liabilities: ["Liabilities"]
    current_liabilities: ["LiabilitiesCurrent"]
    cash: ["CashAndCashEquivalentsAtCarryingValue"]
    short_term_investments: ["ShortTermInvestments"]
    # Deuda: si hay tramos no corriente + corriente se suman; si no, se usa el total.
    # Las variantes "...AndCapitalLeaseObligations" cubren sectores intensivos en capital.
    long_term_debt_noncurrent: ["LongTermDebtNoncurrent", "LongTermDebtAndCapitalLeaseObligations"]
    current_debt:
      - "LongTermDebtCurrent"
      - "DebtCurrent"
      - "LongTermDebtAndCapitalLeaseObligationsCurrent"
    long_term_debt_total:
      - "LongTermDebt"
      - "DebtLongtermAndShorttermCombinedAmount"
      - "DebtAndCapitalLeaseObligations"
    equity: ["StockholdersEquity"]
    # --- Acciones en circulación ---
    shares:
      - "CommonStockSharesOutstanding"
      - "WeightedAverageNumberOfDilutedSharesOutstanding"
      - "WeightedAverageNumberOfSharesOutstandingBasic"
      - "EntityCommonStockSharesOutstanding"

# -----------------------------------------------------------------------------
# Etapa 2 — Filtros de descarte
# -----------------------------------------------------------------------------
filters:
  # Sectores excluidos (basado en códigos SIC agrupados)
  excluded_sectors:
    - "Banking"            # bancos comerciales y de inversión
    - "Insurance"          # aseguradoras
    - "Utilities"          # utilities reguladas
  
  # Deuda
  debt:
    # Deuda Neta / EBITDA máximo permitido
    max_net_debt_ebitda: 4.0
    # Número de años consecutivos en que debe superarse para descartar
    sustained_years: 3
    # Cobertura mínima de intereses (EBIT / gastos financieros)
    min_interest_coverage: 2.0
  
  # Dilución del accionista
  dilution:
    # Crecimiento máximo anual de acciones en circulación (%)
    max_share_growth_pct: 3.0
    # Número de años consecutivos en que debe superarse para descartar
    sustained_years: 3
  
  # Rentabilidad básica
  profitability:
    # Máximo número de años con pérdidas netas en el histórico
    max_loss_years: 2
    # Máximo número de años con FCF negativo en el histórico
    max_negative_fcf_years: 2
    # Ventana de histórico a revisar (años)
    lookback_years: 5
  
  # Calidad contable
  accounting_quality:
    # CFO / Beneficio Neto mínimo
    min_cfo_to_net_income: 0.5
    # Número de años consecutivos en que debe incumplirse para descartar
    sustained_years: 3

# -----------------------------------------------------------------------------
# Etapa 3 — Puntuación de calidad (F-Score de Piotroski adaptado)
# -----------------------------------------------------------------------------
quality:
  # Pesos del F-Score adaptado (9 criterios originales de Piotroski)
  fscore_weight: 0.6
  # Complementos: intensidad de capital (capex/CFO) y tendencia del margen operativo
  capex_intensity_weight: 0.2
  margin_trend_weight: 0.2
  # Ventana (años) sobre la que se evalúan los dos complementos
  trend_window_years: 4

  # Puntuación mínima para pasar la etapa de calidad (sobre 1.0)
  min_quality_score: 0.5

# -----------------------------------------------------------------------------
# Etapa 4 — Valoración compuesta
# -----------------------------------------------------------------------------
valuation:
  dcf:
    # Número de años de proyección explícita
    projection_years: 10
    # Tasa de crecimiento del valor terminal (Gordon)
    terminal_growth_rate: 0.025
    # Prima de riesgo de mercado para CAPM
    equity_risk_premium: 0.055
    # Prima adicional por tamaño (small cap)
    size_premium: 0.01
    # Rango de variación de WACC para el análisis de sensibilidad
    wacc_sensitivity_range: 0.02   # ± 2 pp
    # Rango de variación de la tasa terminal para sensibilidad
    terminal_growth_sensitivity_range: 0.01  # ± 1 pp
  
  multiples:
    # Percentil usado para la mediana sectorial (50 = mediana estricta)
    sector_percentile: 50
    # Múltiplos utilizados
    metrics:
      - "PE"
      - "EV_EBIT"
      - "EV_EBITDA"
      - "P_FCF"
  
  # Jerarquía de integración del rango de valor
  integration:
    dcf_weight: 0.60
    multiples_weight: 0.30
    graham_weight: 0.10

# -----------------------------------------------------------------------------
# Etapa 5 — Margen de seguridad y construcción de cartera
# -----------------------------------------------------------------------------
portfolio:
  # Margen de seguridad mínimo para entrar en la cartera (%)
  min_margin_of_safety: 0.30     # 30%
  # Máximo número de posiciones
  max_positions: 15
  # Ponderación (equiponderada por defecto)
  weighting: "equal"             # opciones: "equal", "quality_weighted"
  
  # Pesos de la regla de priorización (calidad vs. margen de seguridad)
  quality_weight: 0.50
  margin_weight: 0.50

# -----------------------------------------------------------------------------
# Backtest (B1)
# -----------------------------------------------------------------------------
backtest:
  # Periodo de calibración / validación
  calibration_end: "2018-12-31"
  validation_start: "2019-01-01"
  
  # Revisión de fundamentales: con cada nuevo 10-K (anual)
  fundamentals_review: "annual"
  
  # Vigilancia de ventas: semanal
  sell_monitoring: "weekly"
  
  # Condición de venta por convergencia: margen de seguridad por debajo de (%)
  sell_threshold_margin: 0.05    # 5%
  
  # Coste de transacción por operación (% del valor operado)
  transaction_cost_pct: 0.001    # 0.1%
  
  # Tratamiento de dividendos: "total_return" (reinvertidos) o "cash"
  dividend_treatment: "total_return"
  
  # Remuneración de la liquidez: "risk_free" (tipo a corto) o "zero"
  cash_yield: "risk_free"

# -----------------------------------------------------------------------------
# Simulación de aportación (B2)
# -----------------------------------------------------------------------------
contributions:
  # Aportación periódica de referencia (DCA fijo)
  periodic_amount: 1000.0        # unidades monetarias (indexadas; da igual la divisa)
  # Frecuencia de aportación
  frequency: "monthly"
  
  # DCA condicional: factor de escala según el margen de seguridad
  # aportación = periodic_amount * scale_factor(margin_of_safety)
  conditional_dca:
    # Margen a partir del cual la aportación empieza a escalar
    base_margin: 0.30
    # Margen al que se suspende la aportación (muy poco descuento)
    suspend_below_margin: 0.05
    # Máximo multiplicador de la aportación
    max_scale_factor: 2.0
  
  # Aportación concentrada: umbral de descuento para concentrar
  concentrated:
    min_margin: 0.45             # 45% de descuento mínimo para activar
    multiplier: 3.0              # 3× la aportación base

# -----------------------------------------------------------------------------
# Outputs
# -----------------------------------------------------------------------------
outputs:
  dir: "outputs"
  figures_dir: "outputs/figures"
  tables_dir: "outputs/tables"
  # Formato de las figuras (pdf recomendado para LaTeX)
  figure_format: "pdf"
  # DPI para figuras rasterizadas de respaldo
  figure_dpi: 150
